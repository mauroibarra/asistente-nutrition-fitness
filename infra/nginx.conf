# ============================================================
# FitAI Assistant — Nginx Reverse Proxy Configuration
# ============================================================
# Routes:
#   /n8n/         → n8n (port 5678) — workflow engine + webhooks
#   /admin/       → admin-panel (port 3000) — user management
#   /.well-known/ → certbot webroot for SSL certificate renewal
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/s;

# Upstream definitions
upstream n8n_backend {
    server n8n:5678;
    keepalive 32;
}

upstream admin_backend {
    server admin-panel:3000;
    keepalive 8;
}

# Redirect HTTP to HTTPS (uncomment in production with SSL)
# server {
#     listen 80;
#     server_name fitai.tudominio.com;
#
#     # Allow certbot challenges
#     location /.well-known/acme-challenge/ {
#         root /var/www/certbot;
#     }
#
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

# Main server block
server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment in production with SSL
    server_name localhost;     # Replace with actual domain in production

    # SSL Configuration (uncomment in production)
    # ssl_certificate /etc/letsencrypt/live/fitai.tudominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/fitai.tudominio.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # Max request body size (for file uploads if needed)
    client_max_body_size 10M;

    # ----------------------------------------------------------
    # n8n — Workflow engine and Telegram webhooks
    # ----------------------------------------------------------
    # Telegram webhooks hit: /n8n/webhook/fitai-telegram
    location /n8n/ {
        limit_req zone=webhook_limit burst=50 nodelay;

        proxy_pass http://n8n_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;

        # Timeout for long-running webhook executions
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # n8n webhook paths (direct access without /n8n prefix)
    location /webhook/ {
        limit_req zone=webhook_limit burst=50 nodelay;

        proxy_pass http://n8n_backend/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # n8n webhook-test paths (development only)
    location /webhook-test/ {
        limit_req zone=webhook_limit burst=50 nodelay;

        proxy_pass http://n8n_backend/webhook-test/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ----------------------------------------------------------
    # Admin Panel — User and membership management
    # ----------------------------------------------------------
    location /admin/ {
        limit_req zone=admin_limit burst=20 nodelay;

        proxy_pass http://admin_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Session cookie settings
        proxy_cookie_path / /admin/;
    }

    # ----------------------------------------------------------
    # Certbot — SSL certificate renewal (production)
    # ----------------------------------------------------------
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ----------------------------------------------------------
    # Health check endpoint
    # ----------------------------------------------------------
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ----------------------------------------------------------
    # Default — Block everything else
    # ----------------------------------------------------------
    location / {
        return 404;
    }
}
